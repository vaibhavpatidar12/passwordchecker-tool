<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login System | Smart Password Generator</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
    <!-- Theme Toggle Button -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fa-solid fa-moon"></i>
    </div>

    <!-- Header -->
    <div class="project-title">
        <i class="fa-solid fa-shield-halved logo"></i>
        <h2>Secure Login System</h2>
        <p>Password Strength Analyzer & Intelligent Generator</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
        <div class="input-group">
            <i class="fa-solid fa-user left-icon"></i>
            <input type="text" id="username" placeholder="Username or Email" required>
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock left-icon"></i>
            <input type="password" id="password" placeholder="Enter Password" required>
            <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
        </div>
        <div class="strength-bar">
            <div id="strength-fill"></div>
        </div>
        <p id="strength-text">⚡ Password Strength</p>
        <button type="submit">
            <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>
    </form>

    <hr>

    <h3>
        <i class="fa-solid fa-key"></i> 
        Smart Password Generator
    </h3>

    <div class="input-group">
        <i class="fa-solid fa-pen left-icon"></i>
        <input type="text" id="customWord" placeholder="Enter your name, pet, or keyword" autocomplete="off">
    </div>

    <div class="generator-buttons">
        <button type="button" id="generateCustomBtn">
            <i class="fa-regular fa-face-smile"></i> Generate From Name
        </button>
        <button type="button" id="generateRandomBtn">
            <i class="fa-solid fa-shuffle"></i> Random Strong Password
        </button>
    </div>

    <div class="generated-box">
        <span id="generatedPassword">✨ Click a button to generate password</span>
        <i class="fa-solid fa-copy copy-icon" id="copyPasswordIcon"></i>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
