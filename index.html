<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Login System</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Theme Toggle -->
    <div class="theme-toggle">
        <i class="fa-solid fa-moon" id="themeToggle"></i>
    </div>

    <!-- Header -->
    <div class="project-title">

        <i class="fa-solid fa-shield-halved logo"></i>

        <h2>Secure Login System</h2>

        <p>Password Strength Analyzer & Generator</p>

    </div>

    <!-- Login Form -->
    <form>

        <div class="input-group">

            <i class="fa-solid fa-user left-icon"></i>

            <input
            type="text"
            placeholder="Username or Email"
            required>

        </div>

        <div class="input-group">

            <i class="fa-solid fa-lock left-icon"></i>

            <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required>

            <i class="fa-solid fa-eye toggle-password"
            id="togglePassword"></i>

        </div>

        <!-- Strength Bar -->

        <div class="strength-bar">
            <div id="strength-fill"></div>
        </div>

        <p id="strength-text">Password Strength</p>

        <button type="submit">
            <i class="fa-solid fa-right-to-bracket"></i>
            Login
        </button>

    </form>

    <hr>

   <form onsubmit="return false;">
...
</form>

<hr>

<h3>
    <i class="fa-solid fa-key"></i>
    Smart Password Generator
</h3>

<div class="input-group">

    <i class="fa-solid fa-user left-icon"></i>

    <input
        type="text"
        id="customWord"
        placeholder="Enter your name or word">

</div>

<div class="generator-buttons">

    <button
        type="button"
        onclick="generateCustomPassword()">
        Generate From Name
    </button>

    <button
        type="button"
        onclick="generateRandomPassword()">
        Random Password
    </button>

</div>

<div class="generated-box">

    <span id="generatedPassword">
        Generated Password Appears Here
    </span>

    <i class="fa-solid fa-copy copy-icon"
       onclick="copyPassword()"></i>

</div>

<script src="script.js"></script>

</body>
</html>
